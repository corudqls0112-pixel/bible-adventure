```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>말씀 듀오 협동게임</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#gameContainer{
display:flex;
gap:20px;
}

canvas{
background:#2c3e50;
border:5px solid black;
}

#versePanel{
width:280px;
background:white;
color:black;
padding:15px;
}

.word{
position:absolute;
background:#fff9c4;
border:1px solid #fbc02d;
padding:5px 10px;
cursor:pointer;
border-radius:20px;
font-weight:bold;
}

#wordArea{
position:relative;
height:300px;
border-bottom:1px solid gray;
}

#startScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:20px;
}
button{
font-size:20px;
padding:10px 20px;
}
</style>

</head>

<body>

<div id="startScreen">
<h1>📖 말씀 듀오</h1>

<p>🔥 Fire : A D W / Shift 대쉬</p>
<p>💧 Water : 방향키 / ↓ 슬라이드</p>
<p>📖 Word Keeper : 말씀 클릭</p>

<button onclick="startGame()">게임 시작</button>
</div>

<div id="gameContainer">

<div>
<canvas id="gameCanvas" width="600" height="500"></canvas>
<div style="text-align:center;margin-top:10px">
Stage <span id="stageNum">1</span>
</div>
</div>

<div id="versePanel">
<h3>📖 말씀 퍼즐</h3>

<div id="wordArea"></div>

<div id="resultVerse"></div>

</div>

</div>

<script>

const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

const wordArea=document.getElementById("wordArea");
const resultVerse=document.getElementById("resultVerse");
const stageNum=document.getElementById("stageNum");

let currentStage=1;
let MAX_STAGE=10;

let gravity=0.45;
let friction=0.8;

let checkpoint={x:30,y:430};

let platforms=[];
let movingPlatforms=[];
let obstacles=[];
let pixels=[];
let key=null;
let doors=[];
let boss=null;

let animFrame=0;

const characters={
fire:{x:30,y:430,w:30,h:30,dx:0,dy:0,jump:11,grounded:false,type:"fire"},
water:{x:70,y:430,w:30,h:30,dx:0,dy:0,jump:11,grounded:false,type:"water"}
};

const keys={};

window.addEventListener("keydown",e=>keys[e.code]=true);
window.addEventListener("keyup",e=>keys[e.code]=false);

const verses=[

{ text:["하나님은","사랑이심이라"], ref:"요일4:8" },

{ text:["서로","사랑하라"], ref:"요13:34" },

{ text:["항상","기뻐하라"], ref:"살전5:16" },

{ text:["쉬지","말고","기도하라"], ref:"살전5:17" },

{ text:["주의","말씀은","내","발에","등이요"], ref:"시119:105" }

{ text:["범사에","감사하라"], ref:"살전5:18" },

{ text:["온유와","겸손으로"], ref:"엡4:2" },

{ text:["항상","기도하고","낙심하지","말라"], ref:"눅18:1" },

{ text:["말씀을","행하는","자가","되라"], ref:"약1:22" },

{ text:["서로","격려하라"], ref:"히10:25" }

];

let collected=[];
let wordObjects=[];

function startGame(){
document.getElementById("startScreen").style.display="none";
loadStage(1);
loop();
}

function loadStage(stage){

stageNum.innerText=stage;

platforms=[];
movingPlatforms=[];
obstacles=[];
doors=[];
boss=null;
pixels=[];
key=null;

characters.fire.x=30;
characters.fire.y=430;
characters.water.x=70;
characters.water.y=430;

/* 기본 바닥 */
platforms.push({x:0,y:470,w:600,h:30});


/* STAGE 1 - 튜토리얼 */
if(stage==1){

platforms.push({x:120,y:420,w:80,h:15});
platforms.push({x:240,y:360,w:80,h:15});
platforms.push({x:360,y:300,w:80,h:15});
platforms.push({x:480,y:240,w:80,h:15});

key={x:520,y:200,w:30,h:30};

}


/* STAGE 2 - 계단형 */
else if(stage==2){

platforms.push({x:100,y:430,w:80,h:15});
platforms.push({x:200,y:390,w:80,h:15});
platforms.push({x:300,y:350,w:80,h:15});
platforms.push({x:400,y:310,w:80,h:15});
platforms.push({x:500,y:270,w:80,h:15});

key={x:520,y:200,w:30,h:30};

}


/* STAGE 3 - 함정 */
else if(stage==3){

platforms.push({x:120,y:400,w:120,h:15});
platforms.push({x:350,y:350,w:120,h:15});

obstacles.push({x:250,y:450,w:100,h:20});

key={x:520,y:200,w:30,h:30};

}


/* STAGE 4 - 이동 플랫폼 */
else if(stage==4){

movingPlatforms.push({
x:150,
y:380,
w:120,
h:15,
dx:2,
minX:150,
maxX:400
});

platforms.push({x:420,y:300,w:120,h:15});

key={x:520,y:200,w:30,h:30};

}


/* STAGE 5 - 첫 보스 */
else if(stage==5){

platforms.push({x:200,y:380,w:200,h:15});

boss={
x:300,
y:430,
w:60,
h:60,
hp:5,
maxHp:5,
dir:1,
attackTimer:0
};

key={x:520,y:200,w:30,h:30};

}


/* STAGE 6 - 미로 */
else if(stage==6){

platforms.push({x:80,y:420,w:100,h:15});
platforms.push({x:200,y:360,w:100,h:15});
platforms.push({x:320,y:420,w:100,h:15});
platforms.push({x:440,y:360,w:100,h:15});

key={x:520,y:200,w:30,h:30};

}


/* STAGE 7 - 긴 점프 */
else if(stage==7){

platforms.push({x:150,y:420,w:80,h:15});
platforms.push({x:300,y:360,w:80,h:15});
platforms.push({x:450,y:300,w:80,h:15});

key={x:520,y:200,w:30,h:30};
}


/* STAGE 8 - 더 어려운 이동 플랫폼 */
else if(stage==8){

movingPlatforms.push({
x:100,
y:380,
w:100,
h:15,
dx:2,
minX:100,
maxX:350
});

movingPlatforms.push({
x:300,
y:300,
w:100,
h:15,
dx:-2,
minX:250,
maxX:500
});

key={x:520,y:200,w:30,h:30};

}


/* STAGE 9 - 함정 + 점프 */
else if(stage==9){

platforms.push({x:120,y:420,w:80,h:15});
platforms.push({x:260,y:350,w:80,h:15});
platforms.push({x:400,y:280,w:80,h:15});

obstacles.push({x:200,y:450,w:80,h:20});
obstacles.push({x:350,y:450,w:80,h:20});

key={x:520,y:200,w:30,h:30};

}


/* STAGE 10 - 최종 보스 */
else if(stage==10){

platforms.push({x:200,y:380,w:200,h:15});

boss={
x:300,
y:420,
w:80,
h:80,
hp:10,
maxHp:10,
dir:1,
attackTimer:0
};
  
key={x:520,y:200,w:30,h:30};

}

setupVersePuzzle();

}

function setupVersePuzzle(){

wordArea.innerHTML="";
resultVerse.innerText="";
collected=[];
wordObjects=[];

let verse=verses[(currentStage-1)%verses.length];

let words=[...verse.text].sort(()=>Math.random()-0.5);

words.forEach(word=>{

let span=document.createElement("div");

span.className="word";
span.innerText=word;

span.style.left=Math.random()*150+"px";
span.style.top=Math.random()*250+"px";

span.onclick=()=>{

if(word===verse.text[collected.length]){

collected.push(word);

resultVerse.innerText=collected.join(" ");

span.style.display="none";

if(collected.length===verse.text.length){

if(boss){
boss.hp--;

if(boss.hp<=0){
boss=null;
spawnKey();
}
}else{
spawnKey();
}

}



}

}

};

wordArea.appendChild(span);

});

}

function spawnKey(){

if(currentStage==1){
key={x:500,y:180,w:30,h:30};
}else{
key={x:540,y:100,w:30,h:30};
}
}

function spawnDoor(){

doors=[{x:300,y:410,w:40,h:60}];

}

function spawnBoss(){

boss={
x:260,
y:120,
w:80,
h:80,
hp:3,
attackTimer:0
};

}

function respawn(){

characters.fire.x=checkpoint.x;
characters.fire.y=checkpoint.y;

characters.water.x=checkpoint.x+40;
characters.water.y=checkpoint.y;

}

let dashCooldown=0;

function update(){

animFrame++;

if(dashCooldown>0)dashCooldown--;

movingPlatforms.forEach(p=>{
p.x+=p.dx;
if(p.x<p.minX||p.x>p.maxX)p.dx*=-1;
});

[characters.fire,characters.water].forEach((char,i)=>{

const ctrl=i==0?
{l:"KeyA",r:"KeyD",j:"KeyW"}:
{l:"ArrowLeft",r:"ArrowRight",j:"ArrowUp"};

if(keys[ctrl.l])char.dx-=0.7;
if(keys[ctrl.r])char.dx+=0.7;

if(keys[ctrl.j]&&char.grounded){
char.dy=-char.jump;
char.grounded=false;
}

if(i==0 && keys["ShiftLeft"] && dashCooldown<=0){
char.dx+=8;
dashCooldown=120;
}

if(i==1 && keys["ArrowDown"]){
char.dx*=1.2;
}

char.dy+=gravity;
char.dx*=friction;

char.x+=char.dx;
char.y+=char.dy;

char.grounded=false;

let allPlatforms=[...platforms,...movingPlatforms];

allPlatforms.forEach(p=>{

if(char.x<p.x+p.w && char.x+char.w>p.x && char.y+char.h>p.y && char.y<p.y+p.h){

if(char.dy>0){
char.y=p.y-char.h;
char.dy=0;
char.grounded=true;
}

}

});

if(char.y>500){
respawn();
}

});

if(key){

if(checkColl(characters.fire,key)||checkColl(characters.water,key)){
key=null;
spawnDoor();
}

}

if(doors.length){

if(checkColl(characters.fire,doors[0])&&checkColl(characters.water,doors[0])){

currentStage++;

if(currentStage>MAX_STAGE){

alert("🎉 모든 말씀을 완성했습니다!");
currentStage=1;

}

loadStage(currentStage);

}

}

if(boss){

boss.attackTimer++;

if(boss.attackTimer>100){

boss.attackTimer=0;

pixels.push({

x:boss.x+Math.random()*80,
y:boss.y+80,
size:10,
dy:3

});

}

}
if(boss){

boss.x += boss.dir*1.5;

if(boss.x < 50 || boss.x > 520){
boss.dir *= -1;
}

}

pixels.forEach(p=>p.y+=p.dy);

pixels.forEach(p=>{

if(checkColl(characters.fire,p)||checkColl(characters.water,p)){
respawn();
}

});

pixels = pixels.filter(p => p.y < 520);
}

function checkColl(a,b){

return a.x<b.x+b.w &&
a.x+a.w>b.x &&
a.y<b.y+b.h &&
a.y+a.h>b.y;

}

function drawCharacter(char){

let bounce=Math.sin(animFrame*0.2)*2;

ctx.fillStyle=char.type=="fire"?"orange":"deepskyblue";

ctx.fillRect(char.x,char.y+bounce,char.w,char.h);

}

function draw(){

ctx.clearRect(0,0,600,500);

ctx.fillStyle="gray";
platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

ctx.fillStyle="purple";
movingPlatforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

if(key){
ctx.fillStyle="gold";
ctx.fillRect(key.x,key.y,30,30);
}

doors.forEach(d=>{
ctx.fillStyle="green";
ctx.fillRect(d.x,d.y,d.w,d.h);
});

pixels.forEach(p=>{
ctx.fillStyle="red";
ctx.fillRect(p.x,p.y,p.size,p.size);
});

if(boss){

ctx.fillStyle="darkred";
ctx.fillRect(boss.x,boss.y,boss.w,boss.h);

/* ⭐ 체력바 배경 */
ctx.fillStyle="black";
ctx.fillRect(boss.x,boss.y-12,boss.w,6);

/* ⭐ 체력바 */
/* ⭐ 체력 색 결정 */
if(boss.hp/boss.maxHp < 0.4){
ctx.fillStyle="red";
}else{
ctx.fillStyle="lime";
}

/* ⭐ 체력바 */
ctx.fillRect(
boss.x,
boss.y-12,
boss.w*(boss.hp/boss.maxHp),
6
);
  
}

drawCharacter(characters.fire);
drawCharacter(characters.water);

}

function loop(){

update();
draw();
requestAnimationFrame(loop);

}

</script>

</body>
</html>
